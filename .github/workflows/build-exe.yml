name: Build Windows EXE

on:
  push:
    branches: [master]
    paths:
      - 'extractors/**'
      - 'generator_sierra_v7_alt.py'
      - 'main.py'
      - 'utils.py'
      - 'version.py'
      - 'logos/**'
      - 'icones/**'
      - '.github/workflows/build-exe.yml'

  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller customtkinter tkinterdnd2 Pillow reportlab pdfplumber PyMuPDF

      - name: Read version
        id: version
        shell: bash
        run: |
          VER=$(python -c "from version import VERSION; print(VERSION)")
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole ^
            --name "SierraAutomacao" ^
            --icon "logo_mark.ico" ^
            --add-data "logo.png;." ^
            --add-data "logos;logos" ^
            --add-data "icones;icones" ^
            --hidden-import "customtkinter" ^
            --hidden-import "tkinterdnd2" ^
            --hidden-import "PIL" ^
            --hidden-import "reportlab" ^
            --hidden-import "pdfplumber" ^
            --hidden-import "fitz" ^
            --collect-all "customtkinter" ^
            --collect-all "tkinterdnd2" ^
            main.py
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SierraAutomacao-v${{ steps.version.outputs.version }}
          path: dist/SierraAutomacao.exe
          retention-days: 90

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Sierra Automação v${{ steps.version.outputs.version }}
          body: |
            Build automático do conversor Sierra.
            
            **Instruções:**
            1. Baixe o `SierraAutomacao.exe`
            2. Coloque na pasta desejada
            3. Execute — arraste os PDFs pra converter
            
            **Alterações nesta versão:**
            - Bradesco: extração completa de franquias (Teto Solar/Panorâmico, Vidros Laterais, todas variantes de Faróis e Lanternas)
          files: dist/SierraAutomacao.exe
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
